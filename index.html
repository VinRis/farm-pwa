<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Tracker Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2e7d32">
  <link rel="apple-touch-icon" href="icon-192.png"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Farm Production Tracker</h1>
  <p>Offline Farm Management</p>
  <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 5px;">
    <button id="switchTypeBtn" type="button" style="width: auto; margin: 0; padding: 8px 15px; background: #689f38; font-size: 0.85rem;">🔄 Switch Type</button>
    <button id="resetBtn" type="button" style="width: auto; margin: 0; padding: 8px 15px; background: #d32f2f; font-size: 0.85rem;">⚠️ Reset App</button>
  </div>
</header>

<main>
  <section id="farmTypeScreen">
    <h2 style="text-align: center; margin-top: 20px;">Select Your Farm Type</h2>
    <div class="stats-grid">
      <button type="button" data-type="dairy" class="card" style="cursor: pointer; border: none; width: 100%;">
        <span style="font-size: 2rem;">🐄</span><br>
        <strong>Dairy Farming</strong>
      </button>
      <button type="button" data-type="poultry" class="card" style="cursor: pointer; border: none; width: 100%;">
        <span style="font-size: 2rem;">🐔</span><br>
        <strong>Poultry Farming</strong>
      </button>
      <button type="button" data-type="crops" class="card" style="cursor: pointer; border: none; width: 100%;">
        <span style="font-size: 2rem;">🌽</span><br>
        <strong>Crop Farming</strong>
      </button>
    </div>
  </section>

  <section id="appScreen" style="display:none;">
    
    <section id="analytics" class="card" style="margin-bottom: 20px;">
      <h2 style="font-size: 1.1rem; margin-bottom: 15px;">📈 Last 7 Days Production</h2>
      <div id="productionChart" class="chart-container">
        </div>
    </section>

    <section id="dashboard">
      <h2>📊 Farm Summary</h2>
      <div class="filter-container" style="margin-bottom: 15px;">
        <label for="monthFilter" style="display: block; font-size: 0.8rem; margin-bottom: 5px;">Filter by Month:</label>
        <select id="monthFilter">
          <option value="all">All Time</option>
        </select>
      </div>

      <div class="stats-grid">
        <div class="card"><p>Records</p><h3 id="totalRecords">0</h3></div>
        <div class="card"><p>Production</p><h3 id="totalQuantity">0</h3></div>
        <div class="card"><p>Expenses</p><h3 id="totalExpenses">0</h3></div>
        <div class="card profit"><p>Total Profit</p><h3 id="totalProfit">0</h3></div>
      </div>
    </section>

    <form id="farmForm" style="margin-top: 20px;">
      <h3>Add New Record</h3>
      <label for="date">Date</label>
      <input type="date" id="date" required>

      <div id="poultryFields" class="extra-fields" style="display:none;">
  <label for="poultrySubtype">Poultry Type</label>
  <select id="poultrySubtype">
    <option value="layers">Layers (Egg Production)</option>
    <option value="broilers">Broilers (Meat Production)</option>
  </select>

  <label for="batchId">Batch/Flock ID</label>
  <input type="text" id="batchId" placeholder="e.g. Batch B-2024">

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div>
      <label for="mortality">Mortality (Birds Lost)</label>
      <input type="number" id="mortality" placeholder="0">
    </div>
    <div>
      <label for="flockSize">Current Flock Size</label>
      <input type="number" id="flockSize" placeholder="Total Birds">
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div>
      <label for="feed">Feed Used (Kg)</label>
      <input type="number" id="feed" step="0.1">
    </div>
    <div>
      <label for="avgWeight" class="broiler-only">Avg Weight (Kg)</label>
      <input type="number" id="avgWeight" step="0.01" class="broiler-only">
    </div>
  </div>
</div>

      <button type="submit">✅ Save Record</button>
    </form>

    <section style="margin-top: 30px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2>Saved Records</h2>
        <button id="exportBtn" type="button" style="width: auto; margin: 0; padding: 8px 15px; background: #1b5e20;">📥 Export CSV</button>
      </div>
      <ul id="records"></ul>
    </section>
  </section>
</main>
<script src="app.js"></script>
  <div id="toast" class="toast">Record Saved Successfully! ✅</div>
</body>
</html>
