<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#4CAF50">
  <!-- CDN libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/idb/7.1.1/idb.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <header id="header">
    <h1 id="title">FarmTrack</h1>
  </header>
  <main id="main-content"></main>
  <nav id="bottom-nav" style="display: none;">
    <button id="dashboard-btn">Dashboard</button>
    <button id="add-record-btn">Add Record</button>
    <button id="records-btn">Records</button>
    <button id="finance-btn">Finance</button>
    <button id="reports-btn">Reports</button>
  </nav>
  <div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>Select Livestock</h2>
      <button onclick="selectLivestock('dairy')">Dairy production</button>
      <button onclick="selectLivestock('poultry')">Poultry production</button>
      <button onclick="selectLivestock('pig')">Pig production</button>
      <button onclick="selectLivestock('goat')">Goat production</button>
    </div>
  </div>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
