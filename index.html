<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Tracker Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2e7d32">
  <link rel="apple-touch-icon" href="icon-192.png"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="mainHeader">Farm Production Tracker</h1>
    <div class="status-bar">
      <span id="statusIndicator"></span>
      <small id="statusText">Online</small>
    </div>
    
    <div class="header-controls">
      <button id="switchTypeBtn" type="button" class="btn-secondary">🔄 Switch Type</button>
      <button id="darkModeBtn" type="button" class="btn-secondary">🌙 Dark Mode</button>
      <button id="resetBtn" type="button" class="btn-danger">⚠️ Reset App</button>
    </div>
</header>

<main>
  <section id="farmTypeScreen">
    <h2 style="text-align: center; margin-top: 20px;">Select Your Farm Type</h2>
    <div class="kpi-grid type-selection-grid"> 
      <button type="button" data-type="dairy" class="card type-btn">🐄<br><strong>Dairy Farming</strong></button>
      <button type="button" data-type="poultry" class="card type-btn">🐔<br><strong>Poultry Farming</strong></button>
      <button type="button" data-type="crops" class="card type-btn" style="grid-column: span 2;">🌽<br><strong>Crop Farming</strong></button>
    </div>
  </section>

  <section id="appScreen" style="display:none; padding-bottom: 80px;">
    
    <div id="dashboard" class="view-section">
      <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
        <h2 style="margin: 0; font-size: 1.2rem;">📊 Summary</h2>
        <div id="poultryToggleContainer" style="display: none;">
          <select id="poultrySubtypeToggle" class="modern-select">
            <option value="layers">🥚 Layers</option>
            <option value="broilers">🍗 Broilers</option>
          </select>
        </div>
      </div>
      <section id="analytics" class="card">
        <h2 class="section-title">📈 7-Day Production</h2>
        <div id="productionChart" class="chart-container"></div>
      </section>
      <div class="financial-overview">
        <div class="card mini-card border-red">
          <span class="label">Expenses</span>
          <strong id="totalExpensesDisplay">KES 0</strong>
        </div>
        <div class="card mini-card border-green">
          <span class="label">Net Profit</span>
          <strong id="totalProfit">KES 0</strong>
        </div>
      </div>
    </div>

    <div id="records-section" class="view-section" style="display:none;">
      <section class="records-section">
        <div class="dashboard-header" style="padding: 15px;">
          <h2>History</h2>
          <button id="exportBtn" type="button" class="export-btn">📥 Export CSV</button>
        </div>
        <ul id="records"></ul>
      </section>
    </div>

    <div id="main-form" class="view-section" style="display:none;">
      <form id="farmForm" class="card main-form">
        <h3>Add New Record</h3>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date" required>
        </div>
        <div id="poultryFields" class="extra-fields" style="display:none;">
            <label>Type</label>
            <select id="poultrySubtype" class="modern-select">
                <option value="layers">Layers</option>
                <option value="broilers">Broilers</option>
            </select>
        </div>
        <div id="dairyFields" class="extra-fields" style="display:none;">
            <label>Cow ID</label>
            <input type="text" id="cowId" placeholder="e.g. Daisy">
        </div>
        <button type="submit" class="save-btn">✅ Save Record</button>
      </form>
    </div>

    <div id="finance-view" class="view-section" style="display:none;">
        <section class="card"><h3>💰 Financials</h3></section>
    </div>

    <div id="settings-view" class="view-section" style="display:none;">
        <section class="card"><h3>⚙️ Settings</h3></section>
    </div>
  </section>
</main>

<nav class="bottom-nav" id="bottomNav" style="display: none;">
  <button class="nav-item active" data-screen="dashboard"><span>📊</span><small>Dash</small></button>
  <button class="nav-item" data-screen="finance-view"><span>💰</span><small>Finance</small></button>
  <button class="nav-item" data-screen="main-form"><span>➕</span><small>Add</small></button>
  <button class="nav-item" data-screen="records-section"><span>📝</span><small>History</small></button>
  <button class="nav-item" data-screen="settings-view"><span>⚙️</span><small>Settings</small></button>
</nav>

<div id="toast" class="toast">Record Saved Successfully! ✅</div>

<div id="confirmModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-icon">⚠️</div>
    <h3>Are you sure?</h3>
    <p id="modalMessage">This action cannot be undone.</p>
    <div class="modal-actions">
      <button id="modalCancel" class="btn-secondary">Cancel</button>
      <button id="modalConfirm" class="btn-danger">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
