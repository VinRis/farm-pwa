<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FarmTrack PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#2e7d32">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <header id="main-header">
        <h1 id="app-title">FarmTrack</h1>
        <div id="sync-status"><i class="fas fa-cloud"></i></div>
    </header>

    <main id="app-content">
        <section id="view-dashboard" class="view active"></section>
        <section id="view-add-record" class="view"></section>
        <section id="view-records" class="view"></section>
        <section id="view-finance" class="view"></section>
        <section id="view-reports" class="view"></section>
    </main>

    <div id="livestock-modal" class="modal">
        <div class="modal-content">
            <h2>Select Livestock</h2>
            <p>Which production are you tracking today?</p>
            <div class="selection-grid">
                <button class="select-btn" data-type="dairy"><i class="fas fa-cow"></i> Dairy</button>
                <button class="select-btn" data-type="poultry"><i class="fas fa-egg"></i> Poultry</button>
                <button class="select-btn" data-type="pig"><i class="fas fa-piggy-bank"></i> Pig</button>
                <button class="select-btn" data-type="goat"><i class="fas fa-cheese"></i> Goat</button>
            </div>
        </div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" data-view="dashboard"><i class="fas fa-chart-line"></i><span>Home</span></button>
        <button class="nav-btn" data-view="add-record"><i class="fas fa-plus-circle"></i><span>Add</span></button>
        <button class="nav-btn" data-view="records"><i class="fas fa-list"></i><span>Logs</span></button>
        <button class="nav-btn" data-view="finance"><i class="fas fa-wallet"></i><span>Finance</span></button>
        <button class="nav-btn" data-view="reports"><i class="fas fa-file-alt"></i><span>Report</span></button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
