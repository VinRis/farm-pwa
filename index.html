<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Theme -->
  <meta name="theme-color" content="#2e7d32">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Farm Production Tracker</h1>
    <p>Offline Farm Records</p>
  </header>

  <main>
    <section id="farmTypeScreen">
  <h2>Select Your Farm Type</h2>

  <button onclick="setFarmType('dairy')">🐄 Dairy Farming</button>
  <button onclick="setFarmType('poultry')">🐔 Poultry Farming</button>
  <button onclick="setFarmType('crops')">🌽 Crop Farming</button>
</section>
    <section id="appScreen" style="display:none;">
  <form id="farmForm">
      </form>
</section>
      <label>Date</label>
      <input type="date" id="date" required>

      <label>Production Quantity</label>
      <input type="number" id="quantity" required>

      <label>Expenses (KES)</label>
      <input type="number" id="expenses">

      <button type="submit">Save Record</button>
    </form>

    <section>
      <h2>Saved Records</h2>
      <ul id="records"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
