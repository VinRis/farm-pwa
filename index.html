<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmTrack</title>

  <meta name="theme-color" content="#2E7D32" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ========== LANDING PAGE ========== -->
<div id="landing-page" class="view-section">
  <div class="landing-content">
    <h1>FarmTrack</h1>
    <p>Select livestock to manage</p>

    <div class="livestock-grid">
      <div class="card dairy" data-livestock="dairy">
        <i class="fa-solid fa-cow fa-3x"></i>
        <h3>Dairy</h3>
      </div>
      <div class="card poultry" data-livestock="poultry">
        <i class="fa-solid fa-egg fa-3x"></i>
        <h3>Poultry</h3>
      </div>
      <div class="card pig" data-livestock="pig">
        <i class="fa-solid fa-piggy-bank fa-3x"></i>
        <h3>Pig</h3>
      </div>
      <div class="card goat" data-livestock="goat">
        <i class="fa-solid fa-hippo fa-3x"></i>
        <h3>Goat</h3>
      </div>
    </div>
  </div>
</div>

<!-- ========== APP SHELL ========== -->
<div id="app-shell" class="view-section hidden">

<header class="app-header">
  <div>
    <button id="menu-toggle" class="icon-btn"><i class="fa fa-bars"></i></button>
    <button id="home-btn" class="icon-btn"><i class="fa fa-home"></i></button>
  </div>
  <h2 id="header-title">FarmTrack</h2>
  <div>
    <button id="theme-toggle" class="icon-btn"><i class="fa fa-moon"></i></button>
  </div>
</header>

<main id="main-content">

  <section id="view-dashboard" class="tab-view active">
    <div id="kpi-container" class="kpi-grid"></div>
    <div class="card chart-card">
      <canvas id="productionChart"></canvas>
    </div>
  </section>

  <section id="view-add" class="tab-view">
    <div class="card">
      <form id="add-record-form">
        <div id="dynamic-fields"></div>
        <button class="btn-primary full-width">Save</button>
      </form>
    </div>
  </section>

  <section id="view-records" class="tab-view"></section>
  <section id="view-finance" class="tab-view"></section>
  <section id="view-vax" class="tab-view"></section>
  <section id="view-settings" class="tab-view"></section>

</main>

<!-- Drawer -->
<div id="side-drawer" class="drawer">
  <nav class="drawer-nav">
    <button class="nav-btn active" data-target="view-dashboard">Dashboard</button>
    <button class="nav-btn" data-target="view-add">Add Entry</button>
    <button class="nav-btn" data-target="view-records">History</button>
    <button class="nav-btn" data-target="view-finance">Finance</button>
    <button class="nav-btn" data-target="view-vax">Reminders</button>
    <button class="nav-btn" data-target="view-settings">Settings</button>
  </nav>
</div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAva7tu7mWrdgJswDIR0W9OWv8ctZ5phPk",
    authDomain: "farmtrack-b470e.firebaseapp.com",
    projectId: "farmtrack-b470e",
    storageBucket: "farmtrack-b470e.firebasestorage.app",
    messagingSenderId: "572276398926",
    appId: "1:572276398926:web:4b39dc570ce2077fae5c1f"
  };

  const fbApp = initializeApp(firebaseConfig);
  window.db = getFirestore(fbApp);
  window.auth = getAuth(fbApp);
</script>

<script type="module" src="app.js"></script>
</body>
</html>
