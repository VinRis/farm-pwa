<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Theme -->
  <meta name="theme-color" content="#2e7d32">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Farm Production Tracker</h1>
    <p>Offline Farm Records</p>
    <button onclick="localStorage.clear(); location.reload();">Reset</button>
  </header>
<main>

  <section id="farmTypeScreen">
    <h2>Select Your Farm Type</h2>

    <button type="button" data-type="dairy">🐄 Dairy Farming</button>
    <button type="button" data-type="poultry">🐔 Poultry Farming</button>
    <button type="button" data-type="crops">🌽 Crop Farming</button>
  </section>

  <section id="appScreen" style="display:none;">
    <section id="dashboard">
  <h2>📊 Farm Summary</h2>
    <select id="monthFilter">
      <option value="all">All Time</option>
    </select>


  <div class="card">
    <p>Total Records</p>
    <h3 id="totalRecords">0</h3>
  </div>

  <div class="card">
    <p>Total Production</p>
    <h3 id="totalQuantity">0</h3>
  </div>

  <div class="card">
    <p>Total Expenses (KES)</p>
    <h3 id="totalExpenses">0</h3>
  </div>
</section>

    <form id="farmForm">

      <label>Date</label>
      <input type="date" id="date" required>

      <label>Production Quantity</label>
      <input type="number" id="quantity" required>

      <label>Price per Unit (KES)</label>
      <input type="number" id="price" required>

      <label>Expenses (KES)</label>
      <input type="number" id="expenses">

      <button type="submit">Save Record</button>

    </form>

    <section>
      <h2>Saved Records</h2>
      <ul id="records"></ul>
    </section>
  </section>

</main>


  <script src="app.js"></script>
</body>
</html>

<div class="card">
  <p>Estimated Profit (KES)</p>
  <h3 id="totalProfit">0</h3>
</div>
