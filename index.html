<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FarmTrack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#16a34a" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<header class="app-header">
  <button id="backBtn" class="icon-btn hidden">
    <i class="bi bi-arrow-left"></i>
  </button>
  <h1 id="headerTitle">FarmTrack</h1>
</header>

<main id="app">

  <!-- Livestock selector -->
  <section id="selector" class="modal active">
    <div class="modal-content">
      <h2>Select livestock</h2>
      <div class="grid">
        <button data-livestock="dairy">🐄 Dairy</button>
        <button data-livestock="poultry">🐔 Poultry</button>
        <button data-livestock="pig">🐖 Pig</button>
        <button data-livestock="goat">🐐 Goat</button>
      </div>
    </div>
  </section>

  <section id="view-dashboard" class="view active"></section>
  <section id="view-add" class="view"></section>
  <section id="view-records" class="view"></section>
  <section id="view-finance" class="view"></section>
  <section id="view-reports" class="view"></section>

</main>

<nav class="bottom-nav">
  <button data-view="dashboard"><i class="bi bi-speedometer2"></i><span>Dashboard</span></button>
  <button data-view="add"><i class="bi bi-plus-circle"></i><span>Add</span></button>
  <button data-view="records"><i class="bi bi-list-ul"></i><span>Records</span></button>
  <button data-view="finance"><i class="bi bi-cash-coin"></i><span>Finance</span></button>
  <button data-view="reports"><i class="bi bi-file-earmark-text"></i><span>Reports</span></button>
</nav>

<script type="module" src="sample-data.js"></script>
<script type="module" src="db.js"></script>
<script type="module" src="utils.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
