<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgriFlow - Farm Management</title>
    <meta name="theme-color" content="#2E7D32">
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    </head>
<body>

    <section id="welcome-screen" class="screen active">
        <div class="welcome-content">
            <h1>AgriFlow 🚜</h1>
            <p>Smart Management for Modern Farmers</p>
            
            <div class="farm-selector">
                <div class="card selector-card" onclick="app.selectMode('dairy')">
                    <i class="fa-solid fa-cow fa-3x"></i>
                    <h3>Dairy Farm</h3>
                </div>
                <div class="card selector-card" onclick="app.selectMode('poultry')">
                    <i class="fa-solid fa-kiwi-bird fa-3x"></i>
                    <h3>Poultry Farm</h3>
                </div>
            </div>

            <div class="backup-controls">
                <button class="btn secondary" onclick="dataManager.exportData()">📥 Backup Data</button>
                <button class="btn secondary" onclick="document.getElementById('restoreFile').click()">📤 Restore</button>
                <input type="file" id="restoreFile" style="display:none" onchange="dataManager.importData(this)">
            </div>
        </div>
    </section>

    <main id="app-container" class="hidden">
        
        <header>
            <div class="header-left">
                <h2 id="page-title">Dashboard</h2>
                <small id="farm-mode-label">Dairy</small>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="app.toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                <button class="icon-btn" onclick="app.logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <div id="content" class="content-scroll">
            </div>

        <button id="fab" class="fab" onclick="ui.openModal('action-modal')">
            <i class="fa-solid fa-plus"></i>
        </button>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="app.navigate('dashboard')">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="app.navigate('history')">
                <i class="fa-solid fa-list"></i>
                <span>History</span>
            </button>
            <button class="nav-item" onclick="app.navigate('finance')">
                <i class="fa-solid fa-coins"></i>
                <span>Finance</span>
            </button>
            <button class="nav-item" onclick="app.navigate('health')">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>Health</span>
            </button>
            <button class="nav-item" onclick="app.navigate('reports')">
                <i class="fa-solid fa-file-pdf"></i>
                <span>Reports</span>
            </button>
        </nav>
    </main>

    <div id="action-modal" class="modal-overlay hidden">
        <div class="modal-content slide-up">
            <h3>Add Record</h3>
            <div class="grid-2">
                <button class="btn-action" onclick="ui.showForm('production')"><i class="fa-solid fa-bucket"></i> Production</button>
                <button class="btn-action" onclick="ui.showForm('finance')"><i class="fa-solid fa-money-bill"></i> Finance</button>
                <button class="btn-action" onclick="ui.showForm('health')"><i class="fa-solid fa-syringe"></i> Health</button>
                <button class="btn-action" onclick="ui.showForm('animal')"><i class="fa-solid fa-paw"></i> New Animal</button>
            </div>
            <button class="btn text-btn" onclick="ui.closeModal()">Cancel</button>
        </div>
    </div>

    <div id="form-modal" class="modal-overlay hidden">
        <div class="modal-content slide-up">
            <h3 id="form-title">Entry</h3>
            <form id="generic-form">
                </form>
            <div class="form-actions">
                <button class="btn secondary" type="button" onclick="ui.closeModal()">Cancel</button>
                <button class="btn primary" type="button" onclick="app.saveForm()">Save</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">Action Successful</div>

    <script src="./app.js"></script>
</body>
</html>
