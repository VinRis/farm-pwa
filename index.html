<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FarmTrack - Farm Management</title>

  <meta name="description" content="Offline-first farm management for Dairy, Poultry, Pig, and Goat." />
  <meta name="theme-color" content="#2E7D32" />
  <link rel="manifest" href="manifest.json" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<!-- ================= AUTH MODAL ================= -->
<div id="auth-modal" class="modal hidden">
  <div class="modal-content card">
    <h3 id="auth-title">Sign In to FarmTrack</h3>
    <p><small>Sync your data across devices.</small></p>

    <form id="auth-form">
      <div class="form-group">
        <input type="email" id="auth-email" placeholder="Email Address" required />
      </div>
      <div class="form-group">
        <input type="password" id="auth-password" placeholder="Password" required />
      </div>
      <button type="submit" id="auth-submit-btn" class="btn-primary full-width">Login</button>
    </form>

    <button id="auth-toggle-btn" class="btn-text full-width">Need an account? Sign Up</button>
    <button type="button" class="btn-secondary full-width" onclick="document.getElementById('auth-modal').classList.add('hidden')">Cancel</button>
  </div>
</div>

<!-- ================= LANDING ================= -->
<div id="landing-page" class="view-section">
  <div class="landing-content">
    <h1>FarmTrack</h1>
    <p>What do you want to manage today?</p>

    <div class="livestock-grid">
      <div class="card dairy" data-livestock="dairy">
        <i class="fa-solid fa-cow fa-3x"></i>
        <h3>Dairy</h3>
      </div>

      <div class="card poultry" data-livestock="poultry">
        <i class="fa-solid fa-egg fa-3x"></i>
        <h3>Poultry</h3>
      </div>

      <div class="card pig" data-livestock="pig">
        <i class="fa-solid fa-piggy-bank fa-3x"></i>
        <h3>Pig</h3>
      </div>

      <div class="card goat" data-livestock="goat">
        <i class="fa-solid fa-hippo fa-3x"></i>
        <h3>Goat</h3>
      </div>
    </div>
  </div>
</div>

<!-- ================= APP SHELL ================= -->
<div id="app-shell" class="view-section hidden">

  <!-- HEADER -->
  <header class="app-header">
    <div>
      <button id="menu-toggle" class="icon-btn" type="button"><i class="fa-solid fa-bars"></i></button>
      <button id="home-btn" class="icon-btn" type="button"><i class="fa-solid fa-house"></i></button>
    </div>

    <h2 id="header-title">FarmTrack</h2>

    <div>
      <button id="auth-status-btn" class="icon-btn" type="button"><i class="fa-solid fa-circle-user"></i></button>
      <button id="theme-toggle" class="icon-btn" type="button"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <section id="view-dashboard" class="tab-view"></section>

    <section id="view-add" class="tab-view">
      <div class="card">
        <h3>Add Production Record</h3>
        <form id="add-record-form">
          <div id="dynamic-fields"></div>
          <button type="submit" class="btn-primary full-width">Save Record</button>
        </form>
      </div>
    </section>

    <section id="view-records" class="tab-view">
      <div class="card">
        <table class="data-table" id="records-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Qty / Value</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="view-finance" class="tab-view">
      <div class="card">
        <form id="add-transaction-form">
          <select name="type" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
          <input type="number" name="amount" placeholder="Amount" required />
          <input type="date" name="date" required />
          <input type="text" name="category" placeholder="Category" />
          <button type="submit" class="btn-primary full-width">Add Transaction</button>
        </form>
      </div>
      <ul id="transaction-list" class="list-group"></ul>
    </section>

    <section id="view-vax" class="tab-view">
      <div class="card">
        <form id="reminder-form">
          <input id="remind-animal" placeholder="Animal" required />
          <input id="remind-task" placeholder="Task" required />
          <input id="remind-date" type="date" required />
          <button class="btn-primary full-width">Set Reminder</button>
        </form>
      </div>
      <ul id="vax-list" class="list-group"></ul>
    </section>

    <section id="view-settings" class="tab-view">
      <div class="card">
        <input id="currency-input" placeholder="Currency (KSh)" />
      </div>
    </section>

  </main>

  <!-- SIDE DRAWER -->
  <div id="side-drawer" class="drawer">
    <div class="drawer-header">
      <h3>FarmTrack</h3>
      <button id="close-drawer" class="icon-btn" type="button"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <nav class="drawer-nav">
      <button class="nav-btn" data-target="view-dashboard">Dashboard</button>
      <button class="nav-btn" data-target="view-add">Add Entry</button>
      <button class="nav-btn" data-target="view-records">History</button>
      <button class="nav-btn" data-target="view-finance">Finance</button>
      <button class="nav-btn" data-target="view-vax">Reminders</button>
      <button class="nav-btn" data-target="view-settings">Settings</button>
    </nav>

    <div class="drawer-footer">
      <span id="user-email-display">Guest User</span>
      <button id="logout-btn" class="btn-text-danger">Logout</button>
    </div>
  </div>

  <div id="drawer-overlay" class="overlay hidden"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
