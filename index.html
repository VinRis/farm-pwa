<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Farm Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen">

    <header id="top-bar" class="hidden sticky top-0 z-40 bg-background-dark/95 backdrop-blur border-b border-gray-800">
        <div class="flex items-center justify-between p-4 h-16 max-w-md mx-auto">
            <button onclick="showPage('welcome')" class="text-white"><span class="material-symbols-outlined">arrow_back</span></button>
            <h1 id="page-title" class="text-white text-lg font-bold">Dashboard</h1>
            <button onclick="showPage('settings')" class="text-white"><span class="material-symbols-outlined">settings</span></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pb-24">
        <section id="page-welcome" class="page-content py-8">
            <h2 class="text-white text-3xl font-bold text-center mb-2">Good Morning, Farmer</h2>
            <p class="text-gray-400 text-center mb-8">Which livestock are you managing today?</p>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="selectLivestock('Dairy')" class="livestock-card" style="background-image: url('https://images.unsplash.com/photo-1546445317-29f4545e9d53?auto=format&fit=crop&q=80&w=400')">
                    <div class="card-overlay">
                        <span class="material-symbols-outlined text-primary">water_drop</span>
                        <p class="font-bold">Dairy Cattle</p>
                    </div>
                </button>
                <button onclick="selectLivestock('Poultry')" class="livestock-card" style="background-image: url('https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&q=80&w=400')">
                    <div class="card-overlay">
                        <span class="material-symbols-outlined text-yellow-400">egg</span>
                        <p class="font-bold">Poultry</p>
                    </div>
                </button>
                </div>
        </section>

        <section id="page-dashboard" class="page-content hidden py-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-surface-dark p-4 rounded-2xl border border-white/5">
                    <p class="text-gray-400 text-xs">TOTAL HERD</p>
                    <h3 class="text-2xl font-bold text-white">145</h3>
                </div>
                <div class="bg-surface-dark p-4 rounded-2xl border border-white/5">
                    <p class="text-gray-400 text-xs">DAILY YIELD</p>
                    <h3 class="text-2xl font-bold text-white">2,400L</h3>
                </div>
            </div>
            <h3 class="text-white font-bold mb-4">Smart Insights</h3>
            <div class="bg-orange-500/10 border border-orange-500/20 p-4 rounded-xl mb-4">
                <p class="text-orange-400 text-sm">Feed efficiency is 10% higher than average.</p>
            </div>
        </section>

        <section id="page-finance" class="page-content hidden py-6">
            <div class="bg-surface-dark p-6 rounded-2xl mb-6">
                <p class="text-gray-400">Net Profit</p>
                <h2 class="text-3xl font-bold text-white">$12,450.00</h2>
            </div>
            <div id="transaction-list" class="space-y-3">
                </div>
        </section>
    </main>

    <button id="fab" onclick="toggleModal('record-modal')" class="hidden fixed bottom-24 right-6 size-14 bg-primary rounded-full shadow-lg flex items-center justify-center text-black z-50">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-background-dark/95 border-t border-gray-800 pb-6 pt-2">
        <div class="flex justify-around max-w-md mx-auto">
            <button onclick="showPage('dashboard')" class="nav-item active"><span class="material-symbols-outlined">dashboard</span></button>
            <button onclick="showPage('history')" class="nav-item"><span class="material-symbols-outlined">history</span></button>
            <button onclick="showPage('finance')" class="nav-item"><span class="material-symbols-outlined">payments</span></button>
            <button onclick="showPage('health')" class="nav-item"><span class="material-symbols-outlined">medical_services</span></button>
        </div>
    </nav>

    <div id="record-modal" class="hidden fixed inset-0 bg-black/80 z-[60] flex items-end">
        <div class="bg-surface-dark w-full rounded-t-3xl p-6 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white text-xl font-bold">New Record</h3>
                <button onclick="toggleModal('record-modal')"><span class="material-symbols-outlined text-white">close</span></button>
            </div>
            <div class="space-y-4">
                <button class="modal-opt" onclick="alert('Add Production logic')">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <div><p class="font-bold">Production Record</p><p class="text-xs text-gray-400">Log milk, eggs, or weight</p></div>
                </button>
                <button class="modal-opt" onclick="alert('Add Finance logic')">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                    <div><p class="font-bold">Financial Transaction</p><p class="text-xs text-gray-400">Record sales or expenses</p></div>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
